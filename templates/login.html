<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOGIN // AI.Code Reviewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chenzi-wrapper auth-page">
        <header class="top-nav">
            <div class="brand">
                <a href="{{ url_for('index') }}" style="text-decoration: none; color: inherit;">
                    <span class="brand-prefix">AI.</span>CodeReviewer
                </a>
            </div>
            <a href="{{ url_for('signup') }}" class="nav-btn primary">SIGN UP</a>
        </header>

        <main class="auth-container">
            <div class="auth-box">
                <h2 class="auth-title">INITIATE_SESSION</h2>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label>// USERNAME</label>
                        <input type="text" name="username" class="cyber-input" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>// PASSWORD</label>
                        <input type="password" name="password" class="cyber-input" required>
                    </div>
                    <button type="submit" class="execute-btn auth-submit">AUTHENTICATE</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
